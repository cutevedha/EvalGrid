name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/evalgrid/
    permissions:
      id-token: write   # required for trusted publishing without a token

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PROJECT_VERSION=$(python -c "import re,pathlib;print(re.search(r'version = \"(.*?)\"', pathlib.Path('pyproject.toml').read_text()).group(1))")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match pyproject version $PROJECT_VERSION" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Check the built artifacts
        run: twine check dist/*

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
